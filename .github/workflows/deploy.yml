name: 🚀 CI/CD — TrustlessSign (Monorepo)

on:
  push:
    tags:
      - 'ext-v*'   # Trigger khusus untuk rilis Extension
  # (Opsional) Uncomment di bawah ini jika Anda tetap ingin menjalankan PHPUnit saat Pull Request
  # pull_request:
  #   branches: [main]

env:
  PROJECT_PATH:  /home/vnot/extra_disk/docker-temp/trustlesssign
  APP_CONTAINER: trustlesssign-app

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Automated Tests (Khusus Web Laravel)
  # ════════════════════════════════════════════════════════════════
  test_web:
    name: 🧪 Run Web Tests (PHPUnit)
    runs-on: self-hosted
    # Hanya jalankan jika tag berawalan 'web-v'
    if: startsWith(github.ref, 'refs/tags/web-v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run PHPUnit inside container
        run: |
          echo "🔬 Running PHPUnit tests..."
          docker exec ${{ env.APP_CONTAINER }} \
            ./vendor/bin/phpunit --stop-on-failure 2>&1
          echo "✅ Tests passed."

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy Web (Backend Laravel & Dashboard UI)
  # ════════════════════════════════════════════════════════════════
  deploy_web:
    name: 🚀 Deploy Web
    needs: test_web
    runs-on: self-hosted
    # Hanya jalankan jika tag berawalan 'web-v'
    if: startsWith(github.ref, 'refs/tags/web-v')

    steps:
      - name: 📦 Pull latest code di VPS (Web)
        run: |
          echo "📦 Pulling latest web code..."
          cd ${{ env.PROJECT_PATH }}
          git fetch origin
          git pull origin main

      - name: 🔨 Build frontend assets (Web/Vite)
        run: |
          echo "🔨 Building frontend assets..."
          docker exec ${{ env.APP_CONTAINER }} \
            sh -c "cd /var/www/html && npm run build"

      - name: 🧹 Clear Laravel caches
        run: |
          echo "🧹 Clearing caches..."
          docker exec ${{ env.APP_CONTAINER }} php artisan cache:clear
          docker exec ${{ env.APP_CONTAINER }} php artisan view:clear
          docker exec ${{ env.APP_CONTAINER }} php artisan route:clear
          docker exec ${{ env.APP_CONTAINER }} php artisan config:clear
          echo "✅ Web Deployment complete!"

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Deploy Extension (Build .crx & Sync via Tailscale)
  # ════════════════════════════════════════════════════════════════
  deploy_extension:
    name: 🧩 Deploy Extension & Sync Desktop
    runs-on: self-hosted
    # Hanya jalankan jika tag berawalan 'ext-v'
    if: startsWith(github.ref, 'refs/tags/ext-v')

    steps:
      - name: 📦 Pull latest code di VPS (Ekstensi)
        run: |
          echo "📦 Pulling latest extension code..."
          cd ${{ env.PROJECT_PATH }}
          git fetch origin
          git pull origin main

      - name: 📦 Build Chrome Extension (.crx)
        run: |
          echo "📦 Packaging Chrome Extension CRX..."
          cd ${{ env.PROJECT_PATH }}/chrome-extension
          npm install
          npm run build:crx

      - name: 🪟 Sync Desktop-PC via Tailscale SSH
        run: |
          echo "🪟 Checking if Desktop-PC (100.106.132.107) is online..."
          if nc -z -w 3 100.106.132.107 22; then
            echo "🟢 Desktop-PC is online. Syncing via Git..."
            ssh \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              -i ~/.ssh/id_ed25519 \
              Server@100.106.132.107 \
              'cd /d "D:\~dev\~iseng\TrustLessSign" && git restore . && git pull origin main && echo [Desktop-PC] Sync complete && git log --oneline -1'
          else
            echo "⚠️ Desktop-PC is offline. Skipping Git sync."
          fi

      - name: 🍏 Sync Macbook Air via Tailscale SSH
        run: |
          echo "🍏 Checking if Macbook Air (100.105.121.8) is online..."
          if nc -z -w 3 100.105.121.8 22; then
            echo "🟢 Macbook Air is online. Syncing via Git..."
            ssh \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=20 \
              -i ~/.ssh/id_ed25519 \
              my@100.105.121.8 \
              'cd ~/Documents/~dev/iseng/TrustLessSign && git restore . && git pull origin main && echo "Macbook Air Sync complete" && git log --oneline -1'
          else
            echo "⚠️ Macbook Air is offline. Skipping Git sync."
          fi

      - name: 📂 Sync Ignored Files to Desktop-PC via SCP
        run: |
          echo "📂 Checking if Desktop-PC (100.106.132.107) is online..."
          if nc -z -w 3 100.106.132.107 22; then
            echo "🟢 Desktop-PC is online. Copying directories and keys via SCP..."
            
            # Create target directories on Windows target
            ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 Server@100.106.132.107 \
              "mkdir \"D:\~dev\~iseng\TrustLessSign\docs\scripts\" \"D:\~dev\~iseng\TrustLessSign\pki-keys\" \"D:\~dev\~iseng\TrustLessSign\secrets\" 2>nul || ver >nul"

            # SCP directories content
            scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
              ${{ env.PROJECT_PATH }}/docs/scripts/* \
              Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign\docs\scripts/" || true

            scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
              ${{ env.PROJECT_PATH }}/pki-keys/* \
              Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign\pki-keys/" || true

            scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
              ${{ env.PROJECT_PATH }}/secrets/* \
              Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign\secrets/" || true

            # SCP individual files
            for file in docs/catatan.md docs/CI-CD.md docs/TrustlessSign_implementation_plan-v5.md docs/TrustlessSign_implementation_plan-v6.md; do
              if [ -f "${{ env.PROJECT_PATH }}/$file" ]; then
                scp -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
                  "${{ env.PROJECT_PATH }}/$file" \
                  Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign/$file"
              fi
            done
          else
            echo "⚠️ Desktop-PC is offline. Skipping SCP sync."
          fi

      - name: 📂 Sync Ignored Files to Macbook Air via SCP
        run: |
          echo "📂 Checking if Macbook Air (100.105.121.8) is online..."
          if nc -z -w 3 100.105.121.8 22; then
            echo "🟢 Macbook Air is online. Copying directories and keys via SCP..."
            
            # Create target directories on macOS target
            ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 my@100.105.121.8 \
              "mkdir -p ~/Documents/~dev/iseng/TrustLessSign/docs/scripts ~/Documents/~dev/iseng/TrustLessSign/pki-keys ~/Documents/~dev/iseng/TrustLessSign/secrets"

            # SCP directories content
            scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
              ${{ env.PROJECT_PATH }}/docs/scripts/* \
              my@100.105.121.8:~/Documents/~dev/iseng/TrustLessSign/docs/scripts/ || true

            scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
              ${{ env.PROJECT_PATH }}/pki-keys/* \
              my@100.105.121.8:~/Documents/~dev/iseng/TrustLessSign/pki-keys/ || true

            scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
              ${{ env.PROJECT_PATH }}/secrets/* \
              my@100.105.121.8:~/Documents/~dev/iseng/TrustLessSign/secrets/ || true

            # SCP individual files
            for file in docs/catatan.md docs/CI-CD.md docs/TrustlessSign_implementation_plan-v5.md docs/TrustlessSign_implementation_plan-v6.md; do
              if [ -f "${{ env.PROJECT_PATH }}/$file" ]; then
                scp -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
                  "${{ env.PROJECT_PATH }}/$file" \
                  my@100.105.121.8:"~/Documents/~dev/iseng/TrustLessSign/$file"
              fi
            done
          else
            echo "⚠️ Macbook Air is offline. Skipping SCP sync."
          fi

          echo "✅ Extension Packaging & Sync complete at $(date '+%Y-%m-%d %H:%M:%S UTC')"
