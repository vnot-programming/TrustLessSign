name: 🚀 CI/CD — TrustlessSign

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_PATH:  /home/vnot/extra_disk/docker-temp/trustlesssign
  APP_CONTAINER: trustlesssign-app

# ──────────────────────────────────────────────────────────────────
# Semua job berjalan di self-hosted runner (VPS ini sendiri).
# Tidak perlu SSH dari GitHub ke VPS — runner sudah ada di dalam VPS.
# ──────────────────────────────────────────────────────────────────
jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Automated Tests (PHPUnit via docker exec lokal)
  # ════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run PHPUnit inside container
        run: |
          echo "🔬 Running PHPUnit tests..."
          docker exec ${{ env.APP_CONTAINER }} \
            ./vendor/bin/phpunit --stop-on-failure 2>&1
          echo "✅ Tests passed."

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy (VPS lokal + sync Desktop-PC via Tailscale)
  # Tidak ada SSH ke VPS — runner sudah di dalam VPS.
  # ════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📦 Pull latest code di VPS
        run: |
          echo "📦 Pulling latest code..."
          cd ${{ env.PROJECT_PATH }}
          git pull origin main

      - name: 🔨 Build frontend assets (npm run build)
        run: |
          echo "🔨 Building frontend assets..."
          docker exec ${{ env.APP_CONTAINER }} \
            sh -c "cd /var/www/html && npm run build"

      - name: 🧹 Clear Laravel caches
        run: |
          echo "🧹 Clearing caches..."
          docker exec ${{ env.APP_CONTAINER }} php artisan cache:clear
          docker exec ${{ env.APP_CONTAINER }} php artisan view:clear
          docker exec ${{ env.APP_CONTAINER }} php artisan route:clear
          docker exec ${{ env.APP_CONTAINER }} php artisan config:clear

      - name: 📦 Build Chrome Extension (.crx)
        run: |
          echo "📦 Packaging Chrome Extension CRX..."
          cd ${{ env.PROJECT_PATH }}/chrome-extension
          npm install
          npm run build:crx

      - name: 🪟 Sync Desktop-PC via Tailscale SSH
        run: |
          echo "🪟 Syncing Desktop-PC (100.106.132.107) via Git..."
          ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=20 \
            -i ~/.ssh/id_ed25519 \
            Server@100.106.132.107 \
            'cd /d "D:\~dev\~iseng\TrustLessSign" && git pull origin main && echo [Desktop-PC] Sync complete && git log --oneline -1'

      - name: 📂 Sync Ignored Files via SCP
        run: |
          echo "📂 Copying directories and keys to Desktop-PC via SCP..."
          
          # Create target directories on Windows target
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 Server@100.106.132.107 \
            "mkdir \"D:\~dev\~iseng\TrustLessSign\docs\scripts\" \"D:\~dev\~iseng\TrustLessSign\pki-keys\" \"D:\~dev\~iseng\TrustLessSign\secrets\" 2>nul || ver >nul"

          # SCP directories content
          scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
            ${{ env.PROJECT_PATH }}/docs/scripts/* \
            Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign\docs\scripts/" || true

          scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
            ${{ env.PROJECT_PATH }}/pki-keys/* \
            Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign\pki-keys/" || true

          scp -r -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
            ${{ env.PROJECT_PATH }}/secrets/* \
            Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign\secrets/" || true

          # SCP individual files
          for file in docs/catatan.md docs/CI-CD.md docs/TrustlessSign_implementation_plan-v5.md docs/TrustlessSign_implementation_plan-v6.md; do
            if [ -f "${{ env.PROJECT_PATH }}/$file" ]; then
              scp -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
                "${{ env.PROJECT_PATH }}/$file" \
                Server@100.106.132.107:"D:\~dev\~iseng\TrustLessSign/$file"
            fi
          done

          echo "✅ Deployment complete at $(date '+%Y-%m-%d %H:%M:%S UTC')"
