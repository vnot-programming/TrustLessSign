name: 🚀 CI/CD — TrustlessSign

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ── Path di VPS ──────────────────────────────────────────────────
  PROJECT_PATH:  /home/vnot/extra_disk/docker-temp/trustlesssign
  TARGET_PATH:   /home/vnot/docker/trustlesssign
  APP_CONTAINER: trustlesssign-app

  # ── Path di Desktop-PC (Windows) ─────────────────────────────────
  WIN_PATH:  "D:\\~dev\\~iseng\\TrustLessSign"
  WIN_HOST:  "100.106.132.107"
  WIN_USER:  "Server"

jobs:
  # ════════════════════════════════════════════════════════════════
  # JOB 1 — Automated Tests (PHPUnit)
  # ════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run PHPUnit via SSH on VPS container
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🔬 Running PHPUnit tests..."
            docker exec ${{ env.APP_CONTAINER }} \
              php artisan test --stop-on-failure 2>&1
            echo "✅ Tests passed."

  # ════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy ke VPS (web app + 4 target folders)
  # ════════════════════════════════════════════════════════════════
  deploy-vps:
    name: 🖥️ Deploy → VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📦 Pull, Build & Sync via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "────────────────────────────────────────"
            echo "📦 [VPS] Pulling latest code from GitHub..."
            cd ${{ env.PROJECT_PATH }}
            git pull origin main

            echo "🔨 [VPS] Building frontend assets (npm run build)..."
            docker exec ${{ env.APP_CONTAINER }} \
              sh -c "cd /var/www/html && npm run build"

            echo "🧹 [VPS] Clearing Laravel caches..."
            docker exec ${{ env.APP_CONTAINER }} php artisan cache:clear
            docker exec ${{ env.APP_CONTAINER }} php artisan view:clear
            docker exec ${{ env.APP_CONTAINER }} php artisan route:clear
            docker exec ${{ env.APP_CONTAINER }} php artisan config:clear

            echo "📂 [VPS] Syncing 4 target folders → ${{ env.TARGET_PATH }}..."
            mkdir -p ${{ env.TARGET_PATH }}
            rsync -av --delete ${{ env.PROJECT_PATH }}/chrome-extension/  ${{ env.TARGET_PATH }}/chrome-extension/
            rsync -av --delete ${{ env.PROJECT_PATH }}/docs/               ${{ env.TARGET_PATH }}/docs/
            rsync -av --delete ${{ env.PROJECT_PATH }}/safari-extension/   ${{ env.TARGET_PATH }}/safari-extension/
            cp ${{ env.PROJECT_PATH }}/README.md ${{ env.TARGET_PATH }}/README.md

            echo "✅ [VPS] Done at $(date '+%Y-%m-%d %H:%M:%S UTC')"

  # ════════════════════════════════════════════════════════════════
  # JOB 3 — Sync ke Desktop-PC Windows (via VPS → Tailscale)
  # Flow: GitHub Actions → SSH(VPS) → SSH(Desktop-PC via Tailscale)
  # ════════════════════════════════════════════════════════════════
  deploy-desktop:
    name: 🪟 Deploy → Desktop-PC (Windows)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🪟 Git Pull on Desktop-PC via VPS jump host
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          port:     ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          # VPS melakukan SSH hop ke Desktop-PC via Tailscale,
          # lalu menjalankan git pull di folder Windows
          script: |
            set -e

            echo "────────────────────────────────────────"
            echo "🪟 [VPS→Desktop-PC] Connecting via Tailscale..."

            ssh \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              -i ~/.ssh/id_ed25519 \
              ${{ env.WIN_USER }}@${{ env.WIN_HOST }} \
              "cd /d \"${{ env.WIN_PATH }}\" && git pull origin main && echo [Desktop-PC] Pull complete && git log --oneline -1"

            echo "✅ [Desktop-PC] Sync done at $(date '+%Y-%m-%d %H:%M:%S UTC')"
